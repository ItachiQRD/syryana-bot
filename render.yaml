# Blueprint Render (plan GRATUIT) — https://render.com
# Après déploiement : configure UptimeRobot sur l’URL publique (voir DEPLOY-GRATUIT.md)
services:
  - type: web
    name: syryana-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Europe/Paris
      - key: PORT
        value: "3000"
    disk:
      name: syryana-data
      mountPath: /app/data
      sizeGB: 1
