# Blueprint Render (plan GRATUIT) — https://render.com
# Après déploiement : configure UptimeRobot sur l’URL publique (voir DEPLOY-GRATUIT.md)
services:
  - type: web
    name: syryana-bot
    runtime: node
    buildCommand: npm install
    startCommand: npm run start:prod
    plan: free
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22.16.0"
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Europe/Paris
      - key: PORT
        value: "3000"
    disk:
      name: syryana-data
      mountPath: /app/data
      sizeGB: 1
